name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  server-tests:
    name: MCP Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  server-typecheck:
    name: MCP Server Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

  unity-tests:
    name: Unity Package EditMode Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: unity-project/Library
          # Invalidate when package dependencies change
          key: unity-library-${{ runner.os }}-${{ hashFiles('unity-project/Packages/manifest.json', 'unity-project/Packages/packages-lock.json') }}
          restore-keys: |
            unity-library-${{ runner.os }}-

      - name: Run Unity EditMode Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: unity-project
          unityVersion: 6000.0.23f1
          testMode: EditMode
          artifactsPath: unity-test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Unity EditMode Test Results
          # Skip Docker image digest verification to save ~30s per run
          customImage: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-test-results
          path: unity-test-results
          retention-days: 14
